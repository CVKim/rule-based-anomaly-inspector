# Default hyper-parameters for the rule-based anomaly inspector.
# All sections are optional; CLI flags override anything set here.

reference:
  blur_ksize: 5         # Gaussian blur applied before stacking
  align: true           # phase-correlation align each sample to the first
  dispersion: std       # 'std' (fast) or 'mad' (robust against bad samples)
  photometric:          # illumination normalization — applied to BOTH master and target
    method: none        # 'none' | 'flat_field' | 'top_hat_white' | 'top_hat_black' | 'clahe'
    sigma: 31.0         # flat_field Gaussian sigma (>> defect size)
    ksize: 51           # top-hat structuring-element size (>> defect size, must be odd)
    clip_limit: 2.0     # CLAHE clip limit
    tile_grid: 8        # CLAHE tile grid (NxN tiles)

  roi:                  # auto-extracted "where the part lives" mask
    method: none        # 'none' | 'otsu_close' | 'fixed_threshold'
    close_ksize: 41     # morph-close kernel — must exceed widest in-part recess
    erode_px: 6         # shrink the mask by N px to drop the boundary halo
    convex_hull: false  # tighten silhouette to convex (good for convex parts)
    fixed_value: 32.0   # only used when method=fixed_threshold
    min_area_fraction: 0.005   # reject "part" candidates below 0.5% of frame

inspect:
  k_sigma: 4.0          # threshold = base_tolerance + k_sigma * std (symmetric default)
  base_tolerance: 5.0   # gray-level floor (8-bit)
  min_blob_area: 30     # connected components smaller than this are dropped
                        # (was 15 in v0.1; raised to 30 for crack-floor headroom)
  blur_ksize: 5         # must match the reference's blur
  align_method: phase   # 'none' | 'phase' | 'phase+ecc' | 'logpolar' | 'logpolar+phase'
  morph_ksize: 3        # open/close kernel size
  k_sigma_dark: null         # asymmetric override; null falls back to k_sigma
  k_sigma_bright: null       # asymmetric override; null falls back to k_sigma
  base_tolerance_dark: null  # asymmetric base; null falls back to base_tolerance
  base_tolerance_bright: null
  auto_ignore_percentile: null   # e.g. 99.0 — auto-mask high-variance pixels
  classify_defects: true         # tag each blob as scratch / spot / dent / smudge

residual:
  mode: absdiff           # 'absdiff' | 'multiscale' | 'ncc' | 'gradient'
  pyramid_levels: 3       # multiscale: number of Gaussian-pyramid levels
  pyramid_combine: max    # multiscale: 'max' (catch most-prominent scale) or 'mean'
  ncc_window: 15          # ncc: square window side (odd, >= 3)
  gradient_op: scharr     # gradient: 'scharr' (preferred for ksize=3) or 'sobel'
  gradient_ksize: 3       # gradient: 1, 3, 5, or 7
  gradient_blend: 0.0     # >0 to ADD weighted gradient residual on top of mode
  extra_modes: []         # e.g. ['gradient'] to fuse extra modes via per-pixel max
